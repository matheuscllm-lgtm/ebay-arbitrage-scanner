# Configuracao do scanner.
# ATENCAO convencao: min_gross_margin_percent e percentual INTEIRO (30 = 30%).

min_gross_margin_percent: 30   # margem bruta minima pra reportar (regra canonica)
min_price_usd: 10.0            # piso de preco (~R$50): abaixo disso, ignora
suspicious_margin_percent: 60  # acima disso vira SUSPEITO (bom demais = conferir)

# Modo confiavel (--confiavel). Decisao 2026-06-10: 50/98 em vez de 100/99
# (abre funil p/ vendedor medio honesto; golpista tem 0-9 avals, nao 96-98%).
# 96% foi avaliado e rejeitado: nivel de conta comprada/sequestrada.
trusted_min_feedback: 50
trusted_min_feedback_pct: 98.0

# Entrega na COMC -- Algona, WA 98001-7409, EUA (mailbox de armazenamento).
# Logo: SO vendedor com item localizado nos EUA (frete domestico, sem
# importacao, elegivel ao Authenticity Guarantee). Filtro aplicado na API
# (itemLocationCountry) + cinto de seguranca no scorer.
required_location_country: US

# Escopo (decisao 2026-06-10): SO graded cards -- PSA 9/10, BGS 9.5/10,
# CGC 9.5/10. Raw fora do funil (nota de terceiro e verificavel por cert
# lookup; condicao de raw nao e). Reverter = graded_only: false.
graded_only: true
